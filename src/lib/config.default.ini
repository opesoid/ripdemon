; RIP Demon user settings (by Opes - https://opes.dev)
; Copied to %LOCALAPPDATA%\RIP-Demon\config.ini on first install.
; Env vars RIPDEMON_MP3_DIR / RIPDEMON_MP4_DIR and CLI flags override these.

[paths]
; Leave blank to use Music/Videos defaults
mp3_dir=
mp4_dir=

[defaults]
; mp4 quality preset: 720 | 1080 (1080p 60fps) | best
quality=1080
; Browser for cookies when empty = off (chrome, edge, firefox, …)
cookies_browser=
; true = always pass --no-playlist
no_playlist=false
; true = open the output folder after a successful download
open_after=false
; true = remove SponsorBlock segments (mp4)
sponsorblock=false
