name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  smoke:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Smoke tests
        shell: pwsh
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File .\tests\Smoke.ps1
